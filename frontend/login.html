<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SkillOS — 登录</title>
  <style>
    :root{--bg:#08080b;--surface:#0f0f13;--surface2:#16161b;--border:#23232a;--accent:#10b981;--text:#e8e8ed;--text2:#9d9da8;--text3:#64646e;--err:#ef4444;--radius:8px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font:14px/1.6 var(--font);height:100vh;display:flex;align-items:center;justify-content:center}
    .login-card{width:360px;padding:40px;background:var(--surface);border:1px solid var(--border);border-radius:12px;text-align:center}
    .login-card .logo{font-size:36px;margin-bottom:16px}
    .login-card h1{font-size:20px;font-weight:700;color:var(--accent);margin-bottom:4px}
    .login-card p{font-size:12px;color:var(--text3);margin-bottom:24px}
    .login-card input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-size:14px;outline:none;margin-bottom:10px;font-family:var(--font);transition:border-color .2s}
    .login-card input:focus{border-color:var(--accent)}
    .login-card button{width:100%;padding:10px;font-size:14px;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;margin-bottom:8px;font-family:var(--font);transition:all .2s}
    .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:.9}
    .btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent)}
    .login-card .error{font-size:12px;color:var(--err);margin-top:8px;min-height:18px}
    .login-card .hint{font-size:11px;color:var(--text3);margin-top:12px}
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">🔧</div>
    <h1>SkillOS</h1>
    <p>对话即沉淀 · Personal Free</p>
    <input id="user" placeholder="用户名" autofocus>
    <input id="pass" type="password" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-primary" onclick="doLogin()">登录</button>
    <button class="btn-secondary" onclick="doRegister()">注册账号</button>
    <div class="error" id="error"></div>
    <div class="hint">首次使用？输入用户名和密码后点击「注册账号」</div>
  </div>

  <script>
    function saveSession(d) {
      if (d.token) localStorage.setItem('sd_auth_token', d.token);
      if (d.user && d.user.username) localStorage.setItem('sd_user', d.user.username);
      if (d.workspace) localStorage.setItem('sd_workspace', JSON.stringify(d.workspace));
    }

    async function doLogin() {
      var u = document.getElementById('user').value.trim();
      var p = document.getElementById('pass').value.trim();
      if (!u || !p) return;
      document.getElementById('error').textContent = '';
      try {
        var r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        var d = await r.json();
        if (r.ok && d.token) {
          saveSession(d);
          window.location.href = '/';
        } else {
          document.getElementById('error').textContent = d.detail || d.error || '登录失败';
        }
      } catch (e) {
        document.getElementById('error').textContent = '无法连接服务器';
      }
    }

    async function doRegister() {
      var u = document.getElementById('user').value.trim();
      var p = document.getElementById('pass').value.trim();
      if (!u || !p) return;
      if (p.length < 4) {
        document.getElementById('error').textContent = '密码至少 4 位';
        return;
      }
      document.getElementById('error').textContent = '';
      try {
        var r = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p, email: '' })
        });
        var d = await r.json();
        if (r.ok && d.token) {
          saveSession(d);
          window.location.href = '/';
        } else {
          document.getElementById('error').textContent = d.detail || d.error || '注册失败';
        }
      } catch (e) {
        document.getElementById('error').textContent = '无法连接服务器';
      }
    }

    (function checkExisting() {
      var token = localStorage.getItem('sd_auth_token');
      if (!token) return;
      fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (d.user && d.user.username && d.user.username !== 'anonymous') {
            window.location.href = '/';
          }
        })
        .catch(function () {});
    })();
  </script>
</body>
</html>
