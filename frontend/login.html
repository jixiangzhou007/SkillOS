<!DOCTYPE html>

<html lang="zh">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>SkillOS — 登录</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css?v=8">

  <style>

    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}

    .login-wrap{width:100%;max-width:400px;position:relative;z-index:1}

    .login-card{padding:40px 36px;background:rgba(26,25,23,.75);border:1px solid var(--border);border-radius:var(--r-lg);text-align:center;backdrop-filter:blur(20px);box-shadow:var(--shadow-lg)}

    .login-card .tag{font:600 var(--t-xs)/1 var(--font);color:var(--a2);letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px}

    .login-card h1{font:700 var(--t-xl)/1.2 var(--font-display);color:var(--text);margin-bottom:4px}

    .login-card p{font:400 var(--t-sm)/1.5 var(--font);color:var(--text3);margin-bottom:28px}

    .login-card input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 14px;color:var(--text);font-size:var(--t-base);outline:none;margin-bottom:10px;font-family:var(--font);transition:border-color var(--t)}

    .login-card input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}

    .login-card button{width:100%;padding:11px;font:600 var(--t-md)/1 var(--font);border:none;border-radius:var(--r-sm);cursor:pointer;margin-bottom:8px;font-family:var(--font);transition:all var(--t)}

    .login-card .btn-primary{background:linear-gradient(135deg,var(--a3),var(--a5));color:#fff;box-shadow:0 4px 16px rgba(212,132,95,.2)}

    .login-card .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(212,132,95,.28)}

    .login-card .btn-secondary{background:transparent;color:var(--text2);border:1px solid var(--border)}

    .login-card .btn-secondary:hover{border-color:rgba(212,132,95,.3);color:var(--a2)}

    .login-card .error{font:400 var(--t-sm)/1.4 var(--font);color:var(--red);margin-top:8px;min-height:18px}

    .login-card .hint{font:400 var(--t-xs)/1.5 var(--font);color:var(--text3);margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}

  </style>

</head>

<body>

  <div class="ambient-bg" aria-hidden="true"></div>

  <div class="login-wrap">

    <div class="login-card">

      <div class="login-logo"><span data-icon="hammer"></span></div>

      <div class="tag">Skill Atelier</div>

      <h1>SkillOS</h1>

      <p>对话即沉淀 · 技能工厂</p>

      <input id="user" placeholder="用户名" autofocus>

      <input id="pass" type="password" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()">

      <button class="btn-primary" onclick="doLogin()">登录</button>

      <button class="btn-secondary" onclick="doRegister()">注册账号</button>

      <div class="error" id="error"></div>

      <div class="hint">首次使用？输入用户名和密码后点击「注册账号」</div>

    </div>

  </div>



  <script src="/storage-keys.js"></script>

  <script src="/icons.js"></script>

  <script>

    function saveSession(d) {

      if (d.token) localStorage.setItem(StorageKeys.AUTH_TOKEN, d.token);

      if (d.user && d.user.username) localStorage.setItem(StorageKeys.USER, d.user.username);

      if (d.workspace) localStorage.setItem(StorageKeys.WORKSPACE, JSON.stringify(d.workspace));

    }



    async function doLogin() {

      var u = document.getElementById('user').value.trim();

      var p = document.getElementById('pass').value.trim();

      if (!u || !p) return;

      document.getElementById('error').textContent = '';

      try {

        var r = await fetch('/api/auth/login', {

          method: 'POST',

          headers: { 'Content-Type': 'application/json' },

          body: JSON.stringify({ username: u, password: p })

        });

        var d = await r.json();

        if (r.ok && d.token) {

          saveSession(d);

          window.location.href = '/';

        } else {

          document.getElementById('error').textContent = d.detail || d.error || '登录失败';

        }

      } catch (e) {

        document.getElementById('error').textContent = '无法连接服务器';

      }

    }



    async function doRegister() {

      var u = document.getElementById('user').value.trim();

      var p = document.getElementById('pass').value.trim();

      if (!u || !p) return;

      if (p.length < 4) {

        document.getElementById('error').textContent = '密码至少 4 位';

        return;

      }

      document.getElementById('error').textContent = '';

      try {

        var r = await fetch('/api/auth/register', {

          method: 'POST',

          headers: { 'Content-Type': 'application/json' },

          body: JSON.stringify({ username: u, password: p, email: '' })

        });

        var d = await r.json();

        if (r.ok && d.token) {

          saveSession(d);

          window.location.href = '/';

        } else {

          document.getElementById('error').textContent = d.detail || d.error || '注册失败';

        }

      } catch (e) {

        document.getElementById('error').textContent = '无法连接服务器';

      }

    }



    (function() {

      var token = localStorage.getItem(StorageKeys.AUTH_TOKEN);

      var user = localStorage.getItem(StorageKeys.USER);

      if (token && user && user !== 'anonymous') {

        window.location.replace('/');

        return;

      }

      if (!token) return;

      fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } })

        .then(function (r) { return r.json(); })

        .then(function (d) {

          if (d.user && d.user.username && d.user.username !== 'anonymous') {

            window.location.href = '/';

          }

        })

        .catch(function () {});

    })();

  </script>

</body>

</html>
